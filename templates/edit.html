<!DOCTYPE html>
<html>
<head>
    <title>Edit Student </title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #74ebd5, #9face6);
            text-align: center;
        }

        .container {
            background: white;
            padding: 25px;
            width: 350px;
            margin: auto;
            margin-top: 80px;
            border-radius: 12px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
        }

        input:focus {
            border-color: #6c63ff;
            box-shadow: 0 0 5px #6c63ff;
        }

        button {
            width: 95%;
            padding: 10px;
            margin-top: 10px;
            background: #6c63ff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #574fd6;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            text-decoration: none;
            color: #333;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✏️ Edit Student information</h2>

    <form method="post">
        <input type="text" name="name" value="{{ student['name'] }}" required>
        <input type="text" name="roll" value="{{ student['roll'] }}" required>
        <input type="text" name="subject" value="{{ student['subject'] }}" required>
        <input type="text" name="percentage" value="{{ student['percentage'] }}" required>

        <button type="submit">Update</button>
    </form>

    
</div>

</body>
</html>
