<!DOCTYPE html>
<html>
<head>
    <title>Student CRUD</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }
        h2 {
            color: #333;
        }
        form {
            background: white;
            padding: 20px;
            margin: auto;
            width: 400px;
            border-radius: 10px;
            box-shadow: 0px 3px 8px gray;
        }
        input {
            width: 90%;
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 8px 15px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }
        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 80%;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }
        th {
            background: #333;
            color: white;
        }
        .edit {
            background: blue;
            color: white;
            padding: 5px 10px;
        }
        .delete {
            background: red;
            color: white;
            padding: 5px 10px;
        }
    </style>
</head>
<body>

<h2>🎓 Student Management System</h2>

<form action="/add" method="post">
    <input type="text" name="name" placeholder="Student Name" required><br>
    <input type="text" name="roll" placeholder="Roll No" required><br>
    <input type="text" name="subject" placeholder="Subject" required><br>
    <input type="text" name="percentage" placeholder="Percentage" required><br>
    <button type="submit">Submit</button>
</form>

<table>
<tr>
    <th>Name</th>
    <th>Roll</th>
    <th>Subject</th>
    <th>Percentage</th>
    <th>Action</th>
</tr>

{% for i, s in enumerate(data) %}
<tr>
    <td>{{ s["name"] }}</td>
    <td>{{ s["roll"] }}</td>
    <td>{{ s["subject"] }}</td>
    <td>{{ s["percentage"] }}</td>
    <td>
        <a href="/update/{{ i }}" class="edit">Update</a>
        <a href="/delete/{{ i }}" class="delete">Delete</a>
    </td>
</tr>
{% end %}

</table>

</body>
</html>
